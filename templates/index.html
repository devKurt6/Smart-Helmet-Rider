<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helmet GPS — Login</title>
  <link rel="stylesheet" href="/static/styles.css">
  <!-- Apply saved theme immediately to prevent flash -->
  <!-- Apply theme INSTANTLY before body paints — prevents any flash -->
  <script>if(localStorage.getItem('theme')==='light')document.documentElement.classList.add('light-mode');</script>
</head>
<body class="auth-body">
  <button class="auth-theme-btn" onclick="toggleTheme()" id="themeToggle">
    <span id="themeIcon">☀️</span>
    <span id="themeLabel">Light</span>
  </button>


  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🏍️</div>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to access your GPS dashboard</p>
    </div>

    <div id="errorMessage" class="message error-message"></div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <input type="text" id="username" name="username"
            placeholder="Enter your username" required autocomplete="username">
          <span class="input-icon">👤</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" name="password"
            placeholder="Enter your password" required autocomplete="current-password">
          <span class="input-icon">🔒</span>
        </div>
      </div>

      <div class="remember-forgot">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe" name="rememberMe">
          <span>Remember me</span>
        </label>
        <a href="/forgot-password" class="forgot-link">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-primary" id="loginBtn">
        <span class="btn-text">Sign In</span>
        <div class="loading-spinner"></div>
      </button>
    </form>

    <div class="auth-divider">or</div>

    <p class="auth-footer-link">
      Don't have an account? <a href="/register">Sign up here</a>
    </p>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
